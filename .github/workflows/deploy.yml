name: Build & Deploy to ECR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: '手動觸發原因'
        required: false
        default: '手動部署'

permissions:
  id-token: write   # OIDC token
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

jobs:
  build-and-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      version_tag: ${{ steps.tags.outputs.version_tag }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      new_task_def_arn: ${{ steps.update-task-def.outputs.task_def_arn }}

    steps:
      # ── Step 1：Checkout ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Step 2：產生兩個明確版本 tag（禁用 latest）────────────────
      - name: Generate image tags
        id: tags
        run: |
          DATE=$(date -u +%Y%m%d)
          VERSION_TAG="v${DATE}-${{ github.run_number }}"
          SHA_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "SHA_TAG=${SHA_TAG}" >> "$GITHUB_ENV"
          echo "生成版本 tag: ${VERSION_TAG}  SHA tag: ${SHA_TAG}"

      # ── Step 3：AWS OIDC 認證（不使用 long-lived keys）────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-LineReport

      # ── Step 4：ECR Login ─────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Step 5：Docker Build（同時打上兩個 tag，禁用 latest）────────
      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          IMAGE_BASE="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          echo "IMAGE_BASE=${IMAGE_BASE}" >> "$GITHUB_ENV"
          docker build \
            -t "${IMAGE_BASE}:${VERSION_TAG}" \
            -t "${IMAGE_BASE}:${SHA_TAG}" \
            .
          echo "Build 完成：${IMAGE_BASE}:${VERSION_TAG} 及 ${IMAGE_BASE}:${SHA_TAG}"

      # ── Step 6：Push VERSION_TAG ──────────────────────────────────
      - name: Push version tag
        run: |
          docker push "${IMAGE_BASE}:${VERSION_TAG}"
          echo "已推送: ${IMAGE_BASE}:${VERSION_TAG}"

      # ── Step 7：Push SHA_TAG ──────────────────────────────────────
      - name: Push SHA tag
        run: |
          docker push "${IMAGE_BASE}:${SHA_TAG}"
          echo "已推送: ${IMAGE_BASE}:${SHA_TAG}"

      # ── Step 8：更新 ECS Task Definition 使用明確版本 tag ──────────
      - name: Update ECS Task Definition image
        id: update-task-def
        env:
          TASK_DEF_FAMILY: line-report
        run: |
          NEW_IMAGE="${IMAGE_BASE}:${VERSION_TAG}"
          echo "更新 Task Definition image 為: ${NEW_IMAGE}"

          # 取得當前 Task Definition JSON
          CURRENT_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_FAMILY}" \
            --query 'taskDefinition' \
            --output json)

          # 替換 image 並移除唯讀欄位
          NEW_DEF=$(echo "${CURRENT_DEF}" \
            | jq --arg img "${NEW_IMAGE}" \
                 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy) |
                  .containerDefinitions[0].image = $img')

          # 寫入暫存檔並重新註冊
          echo "${NEW_DEF}" > /tmp/task-def.json
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"
          echo "新 Task Definition ARN: ${NEW_ARN}"

      # ── Step 9（選用）：CDK deploy 同步 state ─────────────────────
      # 若需要 CDK 同步，取消以下 step 的 '#' 前綴
      # - name: CDK deploy EcsStack
      #   working-directory: iac
      #   run: |
      #     npm ci
      #     npx cdk deploy LineReportEcsStack \
      #       --context imageTag="${VERSION_TAG}" \
      #       --require-approval never

  # ── 部署摘要 ──────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    steps:
      - name: Print deployment summary
        run: |
          echo "## 部署摘要" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| 項目 | 值 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version Tag | \`${{ needs.build-and-push.outputs.version_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA Tag | \`${{ needs.build-and-push.outputs.sha_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Task Def ARN | \`${{ needs.build-and-push.outputs.new_task_def_arn }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
